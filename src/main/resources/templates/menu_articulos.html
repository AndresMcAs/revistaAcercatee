<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:insert="~{header :: encabezado}">
    <title>Menú de Artículos</title>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<div th:insert="~{header :: navbar}"></div>

<div class="container my-4">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Menú de Artículos</h4>
        </div>

        <div class="card-body">

            <!-- BARRA SUPERIOR -->
            <div class="d-flex flex-wrap gap-2 mb-3">
              
                <input type="text" class="form-control w-auto" placeholder="Buscar artículo..." name ="buscar" >

                <button class="btn btn-outline-primary" onclick="window.location.href='/articulo/buscar'">
                    🔎 Buscar
                </button>

                <button class="btn btn-success"
                        onclick="window.location.href='/articulo/registro'">
                    ➕ Agregar Artículo
                </button>

                <button class="btn btn-danger" onclick="abrirModalEliminar()">
                    ❌ Eliminar
                </button>
					<button class="btn btn-primary" onclick="editarArticulo()">
						✏️ Editar</button>

					<button class="btn btn-warning"  onclick="window.location.href='/asignacionRevision'">
                    📝 Asignar Revisión
                </button>

                <button class="btn btn-secondary">
                    📄 Generar Dictamen
                </button>

            </div>

            <!-- TABLA -->
            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle text-center">

                    <thead class="table-dark">
                        <tr>
                            <th>Artículo</th>
                            <th>Autor principal</th>
                            <th>Estatus</th>
                            <th>Tema</th>
                            <th>Sección</th>
                            <th>N° caracteres</th>
                        </tr>
                    </thead>

						<tbody id="tablaArticulos">

							<tr th:each="articulo : ${articulos}" th:data-id="${articulo.id}"
								onclick="seleccionarFila(this)">

								<!-- TÍTULO -->
								<td th:text="${articulo.titulo}"></td>

								<!-- AUTOR PRINCIPAL -->

								<td th:text="${articulo.autorPrincipal.nombre}"></td>

								<!-- ESTATUS -->
								<td th:text="${articulo.estatus}"></td>

								<!-- TEMA -->
								<td th:text="${articulo.tema}"></td>

								<!-- SECCIÓN -->
								<td th:text="${articulo.seccion}"></td>

								<!-- NÚMERO -->
								<td th:text="${articulo.numero}"></td>

							</tr>

						</tbody>

					</table>

            </div>

            <!-- PAGINACIÓN -->
            <div class="d-flex justify-content-between align-items-center mt-3">

                <button class="btn btn-outline-primary btn-sm" id="btnAnterior">
                    ⬅ Anterior
                </button>

                <span id="infoPagina" class="fw-bold">
                    Página 1
                </span>

                <button class="btn btn-outline-primary btn-sm" id="btnSiguiente">
                    Siguiente ➡
                </button>

            </div>

        </div>
    </div>
</div>
<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirmar eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                ¿Seguro que deseas eliminar este artículo?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button class="btn btn-danger" onclick=" confirmarEliminacion()">
                    Eliminar
                </button>
            </div>

        </div>
    </div>
</div>

</body>

<script>
let articuloSeleccionadoId = null;

// Seleccionar fila
function seleccionarFila(fila) {

    document.querySelectorAll("#tablaArticulos tr").forEach(tr => {
        tr.classList.remove("table-primary");
    });

    fila.classList.add("table-primary");

    articuloSeleccionadoId = fila.getAttribute("data-id");
}

// Abrir modal
function abrirModalEliminar() {

    if (!articuloSeleccionadoId) {
        alert("Selecciona un artículo primero");
        return;
    }
   
    let modal = new bootstrap.Modal(document.getElementById('modalEliminar'));
    modal.show();
}

// Confirmar eliminación
function confirmarEliminacion() {

    fetch(`/articulo/eliminar/${articuloSeleccionadoId}`, {
        method: "POST"
    })
    .then(response => {
        if (response.ok) {
            location.reload();
        } else {
            alert("Error al eliminar");
        }
    })
    .catch(error => console.error(error));
}

</script>
<script>
function editarArticulo() {

    if (!articuloSeleccionadoId) {
        alert("Selecciona un artículo primero");
        return;
    }

    window.location.href = `/articulo/editar/${articuloSeleccionadoId}`;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
