<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Revisión de Artículos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .visor-documento {
            height: 600px;
            border: 1px solid #ccc;
            background-color: #f8f9fa;
            overflow: auto;
            padding: 15px;
        }
        .paginacion-doc {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
</head>


<body class="bg-light">

  <!-- NAVBAR -->
<div th:insert="~{header :: navbar}"></div>
<div class="container-fluid mt-4">

    <div class="row">

        <!-- ================= PANEL IZQUIERDO (DATOS) ================= -->
        <div class="col-md-5">

            <div class="card">
                <div class="card-header bg-primary text-white">
                    Datos del Artículo
                </div>

                <div class="card-body">

                    <div class="mb-3">
                        <label class="form-label">Nombre del Artículo</label>
                        <input type="text" class="form-control" id="nombreArticulo" readonly value="Título del artículo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de Revisión</label>
                        <input type="text" class="form-control" id="tipoRevision" readonly value="Revisión Editorial">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Documento</label><br>
                        <a href="#" class="btn btn-outline-primary btn-sm">Descargar Documento</a>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">URL del Documento</label>
                        <div class="input-group">
                            <input type="text" class="form-control" value="https://documento.com/articulo1" readonly>
                            <button class="btn btn-secondary" onclick="abrirURL()">Abrir</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Estatus</label>
                        <select class="form-select" id="estatus">
                            <option>En revisión</option>
                            <option>Pendiente</option>
                            <option>Rechazado</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Comentarios Generales</label>
                        <textarea class="form-control" rows="4" id="comentarios"></textarea>
                        <button class="btn btn-success mt-2" onclick="guardarComentario()">Guardar Comentario</button>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subir Documento Word</label>
                        <input type="file" class="form-control" accept=".doc,.docx">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Subir Documento Corregido</label>
                        <input type="file" class="form-control" accept=".doc,.docx">
                    </div>

                    <div class="mb-3 form-check">
                        <input type="radio" class="form-check-input" id="finalizado">
                        <label class="form-check-label">
                            Revisión Finalizada
                        </label>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button class="btn btn-primary">Guardar Cambios</button>
                        <button class="btn btn-danger">Cancelar</button>
                    </div>

                </div>
            </div>

        </div>

        <!-- ================= PANEL DERECHO (VISUALIZADOR) ================= -->
        <div class="col-md-7">

            <div class="card">
                <div class="card-header bg-secondary text-white">
                    Visualización del Documento
                </div>

                <div class="card-body">

                    <div class="visor-documento" id="visorDocumento">
                        <h5>Página 1</h5>
                        <p>Contenido del documento cargado desde base de datos...</p>
                        <p>Este visor será reemplazado por el documento real cuando se conecte al backend.</p>
                    </div>

                    <div class="paginacion-doc">
                        <button class="btn btn-outline-secondary btn-sm me-2" onclick="paginaAnterior()">Anterior</button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="paginaSiguiente()">Siguiente</button>
                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

<script>

    let paginaActual = 1;
    let totalPaginas = 5; // Simulado

    function paginaSiguiente() {
        if (paginaActual < totalPaginas) {
            paginaActual++;
            actualizarPagina();
        }
    }

    function paginaAnterior() {
        if (paginaActual > 1) {
            paginaActual--;
            actualizarPagina();
        }
    }

    function actualizarPagina() {
        document.getElementById("visorDocumento").innerHTML = `
            <h5>Página ${paginaActual}</h5>
            <p>Contenido simulado del documento en la página ${paginaActual}.</p>
        `;
    }

    function abrirURL() {
        window.open("https://documento.com/articulo1", "_blank");
    }

    function guardarComentario() {
        const comentario = document.getElementById("comentarios").value;
        alert("Comentario guardado correctamente");
        console.log("Comentario:", comentario);
    }

</script>

</body>
</html>
