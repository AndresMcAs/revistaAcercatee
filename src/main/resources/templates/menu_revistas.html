<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Menú Revistas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>


<div class="container mt-4">

<h2 class="mb-4">Menú Revistas</h2>

<div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">

<input type="text"
class="form-control w-50"
placeholder="Buscar revista...">

<div class="d-flex gap-2">

<button class="btn btn-success"
th:onclick="|window.location.href='@{/nuevaRevista}'|">

Nueva Revista

</button>

<button class="btn btn-warning text-white">

Editar Revista

</button>

<button class="btn btn-danger">

Eliminar

</button>

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle text-center">

<thead class="table-primary">

<tr>
<th>Número de la Revista</th>
<th>Fecha de Publicación</th>
<th>Documento</th>
<th>Publicado</th>
<th>En proceso</th>
<th>En línea</th>
<th>En papel</th>
</tr>

</thead>

<tbody>

<tr>

<td class="text-start">Revista Científica MX</td>
<td>2024-05-15</td>

<td>
<a href="#" class="btn btn-sm btn-outline-primary">
Ver PDF
</a>
</td>

<td><input type="checkbox" class="form-check-input" checked></td>
<td><input type="checkbox" class="form-check-input"></td>
<td><input type="checkbox" class="form-check-input" checked></td>
<td><input type="checkbox" class="form-check-input"></td>

</tr>

<tr>

<td class="text-start">Innovación Tecnológica</td>
<td>2024-08-01</td>

<td>
<a href="#" class="btn btn-sm btn-outline-primary">
Ver PDF
</a>
</td>

<td><input type="checkbox" class="form-check-input"></td>
<td><input type="checkbox" class="form-check-input" checked></td>
<td><input type="checkbox" class="form-check-input"></td>
<td><input type="checkbox" class="form-check-input"></td>

</tr>

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
