<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú de Revisión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
<div th:insert="~{header :: navbar}"></div>
<div class="container my-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Menú de Revisión</h4>
        </div>

        <div class="card-body">

            <!-- BARRA SUPERIOR -->
            <div class="d-flex gap-2 mb-3">
                <input type="text" id="busqueda" class="form-control w-50"
                       placeholder="Buscar artículo...">

                <button class="btn btn-outline-primary" onclick="buscar()">
                    🔎 Buscar
                </button>

                <button class="btn btn-success" onclick="window.location.href='revisionArticulo'">
                    📝 Revisar
                </button>
              
                
            </div>

            <!-- MENSAJE -->
            <div id="mensajeAccion"></div>
            <h3>Artículos Asignados </h3>
            <!-- TABLA -->
            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Artículo</th>
                            <th>Autor</th>
                            <th>Estatus</th>
                            <th>Tema</th>
                            <th>Sección</th>
                            <th>N° Páginas</th>
                            <th>Fecha Asignación</th>
                            <th>Aceptar</th>
                            <th>Rechazar</th>
                        </tr>
                    </thead>
                    <tbody id="tablaRevision"></tbody>
                </table>
            </div>

            <!-- PAGINACIÓN -->
            <div class="d-flex justify-content-between mt-3">
                <button class="btn btn-outline-primary btn-sm" onclick="anterior()">⬅ Anterior</button>
                <span id="infoPagina" class="fw-bold"></span>
                <button class="btn btn-outline-primary btn-sm" onclick="siguiente()">Siguiente ➡</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>


/* ===============================
   PAGINACIÓN
================================= */

const filasPorPagina = 10;
let paginaActual = 1;
let datosFiltrados = [...articulos];

function cargarTabla() {

    const tabla = document.getElementById("tablaRevision");
    tabla.innerHTML = "";

    const inicio = (paginaActual - 1) * filasPorPagina;
    const fin = inicio + filasPorPagina;

    const datosPagina = datosFiltrados.slice(inicio, fin);

    datosPagina.forEach(a => {

        const deshabilitado = a.decision !== null ? "disabled" : "";

        const fila = `
            <tr>
                <td>${a.articulo}</td>
                <td>${a.autor}</td>
                <td>${a.estatus}</td>
                <td>${a.tema}</td>
                <td>${a.seccion}</td>
                <td>${a.paginas}</td>
                <td>${a.fecha}</td>
                <td>
                    <button class="btn ${a.decision === 'aceptado' ? 'btn-success' : 'btn-outline-success'} btn-sm"
                            ${deshabilitado}
                            onclick="aceptar(${a.id})">
                        ✔
                    </button>
                </td>
                <td>
                    <button class="btn ${a.decision === 'rechazado' ? 'btn-danger' : 'btn-outline-danger'} btn-sm"
                            ${deshabilitado}
                            onclick="rechazar(${a.id})">
                        ❌
                    </button>
                </td>
            </tr>
        `;

        tabla.innerHTML += fila;
    });

    document.getElementById("infoPagina").textContent =
        "Página " + paginaActual;
}

function siguiente() {
    if (paginaActual * filasPorPagina < datosFiltrados.length) {
        paginaActual++;
        cargarTabla();
    }
}

function anterior() {
    if (paginaActual > 1) {
        paginaActual--;
        cargarTabla();
    }
}

/* ===============================
   ACEPTAR / RECHAZAR
================================= */

function aceptar(id) {

    const articulo = articulos.find(a => a.id === id);
    articulo.decision = "aceptado";
    articulo.estatus = "Aceptado";

    enviarNotificacion(articulo, "aceptado");
    mostrarMensaje("Has aceptado la revisión del artículo.");

    cargarTabla();
}

function rechazar(id) {

    const articulo = articulos.find(a => a.id === id);
    articulo.decision = "rechazado";
    articulo.estatus = "Rechazado";

    enviarNotificacion(articulo, "rechazado");
    mostrarMensaje("Has rechazado la revisión del artículo.");

    cargarTabla();
}

/* ===============================
   NOTIFICACIÓN (Simulada)
================================= */

function enviarNotificacion(articulo, decision) {

    console.log("Enviando correo a:", articulo.correo);
    console.log("Mensaje: Su artículo ha sido " + decision);

    // Aquí luego se conectará al backend real
}

/* ===============================
   MENSAJE
================================= */

function mostrarMensaje(texto) {

    document.getElementById("mensajeAccion").innerHTML = `
        <div class="alert alert-info alert-dismissible fade show mt-3">
            ${texto}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
}

/* ===============================
   BUSCAR
================================= */

function buscar() {

    const texto = document.getElementById("busqueda").value.toLowerCase();

    datosFiltrados = articulos.filter(a =>
        a.articulo.toLowerCase().includes(texto) ||
        a.autor.toLowerCase().includes(texto)
    );

    paginaActual = 1;
    cargarTabla();
}

cargarTabla();

</script>

</body>
</html>
