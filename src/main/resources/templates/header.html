<!DOCTYPE html>
<html>

<head th:fragment="encabezado">
    <meta charset="UTF-8">
 
    <!-- BOOTSTRAP CDN (opcional si no usas webjars) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"> <h1>ACÉRCATE</h1></a>

        <!-- BOTÓN RESPONSIVE -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENÚ -->
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/registroAutores}">Registro de Autores</a>
                </li>
                
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/registroUsuarios}">Registro de Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/articulo}">Artículos</a>
                </li>
                

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/menuRevistas}">Revistas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/menuRevision}">Revisiones</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/publicaciones}">Publicaciones</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- SCRIPTS -->
<th:block th:fragment="scripts">

    <script th:src="@{/webjars/jquery/3.6.0/jquery.min.js}"></script>

    <script th:src="@{/js/Revista.js}"></script>

    <script th:src="@{/webjars/jquery-validation/1.19.3/jquery.validate.min.js}"></script>


    <!-- MENÚ ACTIVO -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const links = document.querySelectorAll(".nav-link");
            const currentPage = window.location.pathname.split("/").pop();

            links.forEach(link => {
                const linkPage = link.getAttribute("href");

                if (linkPage === currentPage) {
                    link.classList.add("active");
                    link.setAttribute("aria-current", "page");
                }
            });
        });
    </script>

</th:block>

</body>
</html>
