</head>

<body class="bg-light">

<!-- navbar----------->   
<div class="container my-4">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registro de Artículos</h4>
        </div>

        <div class="card-body">
            <form>

                <!-- TÍTULO -->
                <div class="mb-3">
                    <label class="form-label">Título del Artículo</label>
                    <input type="text" class="form-control" required>
                </div>

                <!-- DESCRIPCIÓN -->
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>

                <div class="row g-3">

                    <div class="col-md-4">
                        <label class="form-label">Fecha de Registro</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Estatus</label>
                        <select class="form-select">
                            <option>En espera</option>
                            <option>Revisado</option>
                            <option>Rechazado</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Versión</label>
                        <select class="form-select">
                            <option>v1</option>
                            <option>v2</option>
                            <option>v3</option>
                            <option>v4</option>
                            <option>v5</option>
                        </select>
                    </div>

                </div>

                <!-- WORD -->
                <div class="mt-3">
                    <label class="form-label">Archivo Word</label>
                    <input type="file" class="form-control" accept=".doc,.docx">
                </div>

                <!-- AUTORES -->
                <div class="mt-4 border rounded p-3">

                    <label class="form-label fw-bold">Autor Principal</label>

                    <div id="autoresContainer">

                        <div class="autor-item mb-2">
                            <select class="form-select">
                                <option>-- Seleccionar autor (BD) --</option>
                            </select>
                        </div>

                        <small id="labelSecundario" class="text-muted d-none">
                            Autor(es) secundario(s)
                        </small>

                    </div>

                    <!-- ICONOS ABAJO DERECHA -->
                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <button type="button"
                                id="btnAgregarAutor"
                                class="btn btn-outline-primary btn-sm">
                            ➕👤
                        </button>

                        <button type="button"
                                class="btn btn-outline-secondary btn-sm"
                                onclick="window.location.href='registro_autores.html'">
                            ➜
                        </button>
                    </div>

                </div>

                <div class="row g-3 mt-3">

                    <div class="col-md-4">
                        <label class="form-label">Número de Caracteres</label>
                        <input type="number" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Tema</label>
                        <select class="form-select">
                            <option>Química</option>
                            <option>Matemáticas</option>
                            <option>TICs</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Sección</label>
                        <select class="form-select">
                            <option>Curiosidades</option>
                            <option>Divulgación</option>
                            <option>Difusión</option>
                            <option>Tiempo fuera</option>
                            <option>Únete</option>
                            <option>Artefacto</option>
                            <option>Semblanzas</option>
                            <option>T-Reto</option>
                        </select>
                    </div>

                </div>

                <!-- IMÁGENES -->
                <div class="mt-4 border rounded p-3">

                    <label class="form-label fw-bold">
                        Imágenes
                        <span id="contadorImagenes" class="text-muted">(0/5)</span>
                    </label>

                    <input type="file"
                           id="imagenesInput"
                           class="form-control"
                           accept="image/*"
                           multiple>

                    <div id="previewImagenes"
                         class="d-flex flex-wrap gap-3 mt-3">
                    </div>

                </div>

                <!-- BOTONES -->
                <div class="d-flex justify-content-end gap-3 mt-4">
                    <button type="submit" class="btn btn-success">Registrar</button>
                    <button type="reset" class="btn btn-danger" onclick="history.back()">Cancelar</button>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ========================= AUTORES ========================= */
const btnAgregarAutor = document.getElementById("btnAgregarAutor");
const autoresContainer = document.getElementById("autoresContainer");
const labelSecundario = document.getElementById("labelSecundario");

let totalAutores = 1;

btnAgregarAutor.addEventListener("click", function () {

    if (totalAutores >= 5) {
        alert("Máximo 5 autores permitidos.");
        return;
    }

    labelSecundario.classList.remove("d-none");

    const div = document.createElement("div");
    div.classList.add("autor-item", "mb-2", "position-relative");

    div.innerHTML = `
        <select class="form-select pe-5">
            <option>-- Seleccionar autor secundario (BD) --</option>
        </select>

        <button type="button"
                class="btn btn-danger btn-sm btnEliminarAutor"
                style="position:absolute; bottom:4px; right:4px;">
            ❌
        </button>
    `;

    autoresContainer.appendChild(div);
    totalAutores++;
});

autoresContainer.addEventListener("click", function (e) {
    if (e.target.classList.contains("btnEliminarAutor")) {
        e.target.parentElement.remove();
        totalAutores--;

        if (totalAutores === 1) {
            labelSecundario.classList.add("d-none");
        }
    }
});


/* ========================= IMÁGENES ========================= */
const imagenesInput = document.getElementById("imagenesInput");
const preview = document.getElementById("previewImagenes");
const contadorImagenes = document.getElementById("contadorImagenes");

let imagenesSeleccionadas = [];

imagenesInput.addEventListener("change", function (event) {

    const archivos = Array.from(event.target.files);

    archivos.forEach(file => {

        if (imagenesSeleccionadas.length >= 5) {
            alert("Solo puedes subir máximo 5 imágenes.");
            return;
        }

        imagenesSeleccionadas.push(file);
    });

    renderizarImagenes();
    imagenesInput.value = "";
});

function renderizarImagenes() {

    preview.innerHTML = "";

    imagenesSeleccionadas.forEach((file, index) => {

        const reader = new FileReader();

        reader.onload = function (e) {

            const div = document.createElement("div");
            div.style.position = "relative";
            div.style.width = "110px";

            div.innerHTML = `
                <img src="${e.target.result}"
                     style="width:100px;height:100px;object-fit:cover;"
                     class="border rounded shadow-sm">

                <button type="button"
                        class="btn btn-danger btn-sm"
                        style="position:absolute; bottom:-8px; right:-8px; padding:2px 6px; font-size:12px;"
                        onclick="eliminarImagen(${index})">
                        ❌
                </button>
            `;

            preview.appendChild(div);
        };

        reader.readAsDataURL(file);
    });

    contadorImagenes.textContent = `(${imagenesSeleccionadas.length}/5)`;
}

function eliminarImagen(index) {
    imagenesSeleccionadas.splice(index, 1);
    renderizarImagenes();
}
</script>

</body>
</html>
