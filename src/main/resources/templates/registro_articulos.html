<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registro de Artículos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<div th:insert="~{header :: navbar}"></div>

<div class="container my-4">
    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h4>Registro de Artículos</h4>
        </div>

        <div class="card-body">

            <form id="form-registro-articulo"
                  th:action="@{/articulo/registro}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- TITULO -->
                <div class="mb-3">
                    <label>Título del Artículo</label>
                    <input type="text" class="form-control" name="titulo" required>
                </div>

                <!-- DESCRIPCION -->
                <div class="mb-3">
                    <label>Descripción</label>
                    <textarea class="form-control" name="descripcion"></textarea>
                </div>

                <div class="row">

                    <div class="col-md-4">
                        <label>Estatus</label>
                        <select class="form-select" name="estatus">
                            <option>En espera</option>
                            <option>Revisado</option>
                            <option>Rechazado</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>Versión</label>
                        <select class="form-select" name="version">
                            <option>v1</option>
                            <option>v2</option>
                            <option>v3</option>
                            <option>v4</option>
                            <option>v5</option>
                        </select>
                    </div>

                </div>

                <!-- WORD -->
                <div class="mt-3">
                    <label>Archivo Word</label>
                    <input type="file" class="form-control" name="archivo" accept=".doc,.docx" required>
                </div>

                <!-- AUTORES -->
                <div class="mt-4 border rounded p-3">

                    <label class="fw-bold">Autor Principal</label>

                    <select class="form-select mb-3" id="autorPrincipal" name="autorPrincipal" required>
                        <option value="" disabled selected>-- Seleccionar autor --</option>

                        <option th:each="autor : ${autores}"
                                th:value="${autor.id}"
                                th:text="${autor.nombre + ' ' + autor.apellidoPat}">
                        </option>
                    </select>

                    <small id="labelSecundario" class="text-muted d-none">
                        Autor(es) secundarios
                    </small>

                    <div id="autoresContainer"></div>

                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <button type="button" id="btnAgregarAutor"
                                class="btn btn-outline-primary btn-sm">
                            ➕👤
                        </button>
                    </div>

                </div>

                <!-- DATOS -->
                <div class="row mt-3">

                    <div class="col-md-4">
                        <label>Número de Caracteres</label>
                        <input type="number" class="form-control" name="numero">
                    </div>

                    <div class="col-md-4">
                        <label>Tema</label>
                        <select class="form-select" name="tema">
                            <option>Química</option>
                            <option>Matemáticas</option>
                            <option>TICs</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>Sección</label>
                        <select class="form-select" name="seccion">
                            <option>Curiosidades</option>
                            <option>Divulgación</option>
                            <option>Difusión</option>
                            <option>Tiempo fuera</option>
                        </select>
                    </div>

                </div>

                <!-- IMÁGENES -->
                <div class="mt-4 border p-3 rounded">

                    <label class="fw-bold">
                        Imágenes <span id="contadorImagenes">(0/5)</span>
                    </label>

                    <input type="file"
                           id="imagenesInput"
                           name="imagenesFiles"
                           class="form-control"
                           accept="image/*"
                           multiple>

                    <div id="previewImagenes" class="d-flex flex-wrap gap-3 mt-3"></div>

                </div>

                <!-- BOTONES -->
                <div class="mt-4 d-flex gap-3">
                    <button class="btn btn-success w-50" type="submit">Registrar</button>
                    <button class="btn btn-danger w-50" type="button" onclick="history.back()">Cancelar</button>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalExitosoError">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Mensaje</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
               <div id="modalMensaje">

    <div th:if="${mensajeExitoso}" class="alert alert-success">
        <span th:text="${mensajeExitoso}"></span>
    </div>

    <div th:if="${mensajeError}" class="alert alert-danger">
        <span th:text="${mensajeError}"></span>
    </div>

</div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-success" data-bs-dismiss="modal">Aceptar</button>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* ================= AUTORES ================= */
$("#btnAgregarAutor").click(function () {

    $("#labelSecundario").removeClass("d-none");

    let principal = $("#autorPrincipal").val();

    let opciones = $("#autorPrincipal option")
        .filter(function () {
            return this.value !== "" && this.value !== principal;
        })
        .map(function () {
            return `<option value="${this.value}">${this.text}</option>`;
        }).get().join("");

    $("#autoresContainer").append(`
        <div class="autor-item mb-2 position-relative">
            <select class="form-select pe-5" name="autoresSecundarios">
                <option value="" selected>Seleccionar</option>
                ${opciones}
            </select>

            <button type="button"
                    class="btn btn-danger btn-sm eliminarAutor"
                    style="position:absolute; right:5px; bottom:5px;">
                ❌
            </button>
        </div>
    `);
});

$(document).on("click", ".eliminarAutor", function () {
    $(this).parent().remove();
});


/* ================= IMÁGENES ================= */
let imagenesSeleccionadas = [];

$("#imagenesInput").change(function (e) {

    Array.from(e.target.files).forEach(file => {
        if (imagenesSeleccionadas.length < 5) {
            imagenesSeleccionadas.push(file);
        }
    });

    renderImagenes();
});

function renderImagenes() {

    $("#previewImagenes").html("");

    imagenesSeleccionadas.forEach((file, index) => {

        let reader = new FileReader();

        reader.onload = function (e) {

            $("#previewImagenes").append(`
                <div style="position:relative">
                    <img src="${e.target.result}"
                         style="width:100px;height:100px;object-fit:cover;">
                    <button onclick="eliminarImagen(${index})"
                        style="position:absolute; bottom:0; right:0;">
                        ❌
                    </button>
                </div>
            `);
        };

        reader.readAsDataURL(file);
    });

    $("#contadorImagenes").text(`(${imagenesSeleccionadas.length}/5)`);
}

function eliminarImagen(index) {
    imagenesSeleccionadas.splice(index, 1);
    renderImagenes();
}


/* ================= ENVÍO AJAX ================= */
$("#form-registro-articulo").submit(function (e) {

    e.preventDefault();

    let formData = new FormData(this);

    imagenesSeleccionadas.forEach(img => {
        formData.append("imagenesFiles", img);
    });

    $.ajax({
        url: "/articulo/registro",
        type: "POST",
        data: formData,
        processData: false,
        contentType: false,

        success: function (resp) {

            $("#modalMensaje").html(resp);

            let modal = new bootstrap.Modal(
                document.getElementById('modalExitosoError')
            );

            modal.show();

            $('#modalExitosoError').on('hidden.bs.modal', function () {
                document.getElementById("form-registro-articulo").reset();
                $("#autoresContainer").html("");
                $("#previewImagenes").html("");
                $("#contadorImagenes").text("(0/5)");
            });
        }
    });
});

</script>

</body>
</html>
