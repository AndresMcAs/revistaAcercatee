<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Artículo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div th:insert="~{header :: navbar}"></div>

<div class="container my-4">
    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h4>Editar Artículo</h4>
        </div>

        <div class="card-body">

            <form th:action="@{'/articulo/editar/' + ${articulo.id}}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- TITULO -->
                <div class="mb-3">
                    <label>Título</label>
                    <input type="text" name="titulo" class="form-control"
                           th:value="${articulo.titulo}" required>
                </div>

                <!-- DESCRIPCIÓN -->
                <div class="mb-3">
                    <label>Descripción</label>
                    <textarea name="descripcion" class="form-control"
                              th:text="${articulo.descripcion}"></textarea>
                </div>

                <!-- ESTATUS / VERSION -->
                <div class="row">
                    <div class="col-md-4">
                        <label>Estatus</label>
                        <select name="estatus" class="form-select">
                            <option th:selected="${articulo.estatus=='En espera'}">En espera</option>
                            <option th:selected="${articulo.estatus=='Revisado'}">Revisado</option>
                            <option th:selected="${articulo.estatus=='Rechazado'}">Rechazado</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>Versión</label>
                        <select name="version" class="form-select">
                            <option th:selected="${articulo.version=='v1'}">v1</option>
                            <option th:selected="${articulo.version=='v2'}">v2</option>
                            <option th:selected="${articulo.version=='v3'}">v3</option>
                            <option th:selected="${articulo.version=='v4'}">v4</option>
                        </select>
                    </div>
                </div>

                <!-- WORD ACTUAL -->
                <div class="mt-3">
                    <label>Archivo actual</label><br>
                    <a th:href="@{${articulo.archivoWord}}" target="_blank" class="btn btn-outline-primary btn-sm">
                        Ver Word
                    </a>
                </div>

                <!-- REEMPLAZAR WORD -->
                <div class="mt-3">
                    <label>Reemplazar Word (opcional)</label>
                    <input type="file" name="archivo" class="form-control">
                </div>

                <!-- AUTOR PRINCIPAL -->
                <div class="mt-4">
                    <label>Autor Principal</label>
                    <select name="autorPrincipal" class="form-select">

                        <option th:each="autor : ${autores}"
                                th:value="${autor.id}"
                                th:text="${autor.nombre}"
                                th:selected="${autor.id == articulo.autorPrincipal.id}">
                        </option>

                    </select>
                </div>

                <!-- AUTORES SECUNDARIOS -->
                <div class="mt-3">
                    <label>Autores Secundarios</label>

                    <div id="autoresContainer">

                        <div th:each="autor : ${articulo.autoresSecundarios}" class="mb-2">
                            <select name="autoresSecundarios" class="form-select">

                                <option th:each="a : ${autores}"
                                        th:value="${a.id}"
                                        th:text="${autor.nombre + ' ' + autor.apellidoPat}"
                                        th:selected="${a.id == autor.id}">
                                </option>

                            </select>
                        </div>

                    </div>

                    <button type="button" id="btnAgregarAutor" class="btn btn-sm btn-primary mt-2">
                        ➕ Autor
                    </button>
                </div>

                <!-- DATOS -->
                <div class="row mt-3">
                    <div class="col-md-4">
                        <label>Número</label>
                        <input type="number" name="numero" class="form-control"
                               th:value="${articulo.numero}">
                    </div>

                    <div class="col-md-4">
                        <label>Tema</label>
                        <input type="text" name="tema" class="form-control"
                               th:value="${articulo.tema}">
                    </div>

                    <div class="col-md-4">
                        <label>Sección</label>
                        <input type="text" name="seccion" class="form-control"
                               th:value="${articulo.seccion}">
                    </div>
                </div>

                <!-- IMÁGENES EXISTENTES -->
                <div class="mt-4">
                    <label>Imágenes actuales</label>

                    <div class="d-flex flex-wrap gap-3">

                        <div th:each="img, iter : ${articulo.imagenes}" style="position:relative">

                            <img th:src="@{${img}}"
                                 style="width:120px;height:120px;object-fit:cover;">

                            <!-- CHECK PARA ELIMINAR -->
                            <input type="checkbox"
                                   name="imagenesEliminar"
                                   th:value="${img}"
                                   style="position:absolute; top:0; right:0;">
                        </div>

                    </div>
                </div>

                <!-- NUEVAS IMÁGENES -->
                <div class="mt-3">
                    <label>Agregar nuevas imágenes</label>
                    <input type="file" name="imagenesFiles" multiple class="form-control">
                </div>

                <!-- BOTONES -->
                <div class="mt-4 d-flex gap-3">
                    <button class="btn btn-success w-50">Actualizar</button>
                    <button type="button" class="btn btn-danger w-50" onclick="history.back()">Cancelar</button>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
/* AGREGAR AUTORES DINÁMICOS */
document.getElementById("btnAgregarAutor").addEventListener("click", function () {

    let select = document.querySelector("select[name='autorPrincipal']");
    let opciones = select.innerHTML;

    let container = document.getElementById("autoresContainer");

    let div = document.createElement("div");
    div.classList.add("mb-2");

    div.innerHTML = `
        <select name="autoresSecundarios" class="form-select">
            ${opciones}
        </select>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
