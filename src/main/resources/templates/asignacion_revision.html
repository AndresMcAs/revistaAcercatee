<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación de Revisión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .articulo-card {
            cursor: pointer;
            transition: 0.2s;
        }
        .articulo-card:hover {
            transform: scale(1.02);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        .dashboard-box {
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
        }
        .lista-articulos {
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">Asignación de Revisión de Artículos</h2>

    <div class="row">

        <!-- ================= LISTA DE ARTÍCULOS ================= -->
        <div class="col-md-6">

            <div class="card">
                <div class="card-header bg-primary text-white">
                    Lista de Artículos
                </div>

                <div class="card-body lista-articulos" id="listaArticulos">
                    <!-- Artículos simulados -->
                </div>

                <div class="card-footer">
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-outline-secondary btn-sm" onclick="paginaAnterior()">Anterior</button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="paginaSiguiente()">Siguiente</button>
                    </div>

                    <div class="mt-3 d-flex">
                        <input type="text" id="buscarTitulo" class="form-control" placeholder="Buscar por título">
                        <button class="btn btn-primary ms-2" onclick="buscarArticulo()">Buscar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= PANEL DE ASIGNACIÓN ================= -->
        <div class="col-md-6">

            <div class="card">
                <div class="card-header bg-success text-white">
                    Asignar Revisión
                </div>
                <div class="card-body">

                    <div class="mb-3">
                        <label class="form-label">Título del Artículo</label>
                        <input type="text" id="tituloSeleccionado" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de Revisión</label>
                        <select id="tipoRevision" class="form-select">
                            <option value="">Seleccione</option>
                            <option>Revisión Editorial</option>
                            <option>Revisión Técnica</option>
                            <option>Corrección de Estilo</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Revisor</label>
                        <select id="revisor" class="form-select">
                            <option>Revisor 1</option>
                            <option>Revisor 2</option>
                            <option>Revisor 3</option>
                        </select>
                    </div>

                    <button class="btn btn-success w-100" onclick="asignarRevision()">Asignar Revisión</button>

                </div>
            </div>
        </div>
    </div>

    <!-- ================= DASHBOARD ================= -->

    <h3 class="mt-5 mb-3">Dashboard de Revisiones</h3>

    <div class="row">

        <div class="col-md-3">
            <div class="card bg-info text-white">
                <div class="card-header">Revisión Editorial</div>
                <div class="card-body dashboard-box" id="editorialBox"></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-dark">
                <div class="card-header">Revisión Técnica</div>
                <div class="card-body dashboard-box" id="tecnicaBox"></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-secondary text-white">
                <div class="card-header">Corrección de Estilo</div>
                <div class="card-body dashboard-box" id="estiloBox"></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-header">Finalizados</div>
                <div class="card-body dashboard-box" id="finalizadosBox"></div>
            </div>
        </div>

    </div>

</div>

<script>
    let articulos = [];
    let paginaActual = 0;
    const porPagina = 10;

    // Simulación de artículos
    for (let i = 1; i <= 35; i++) {
        articulos.push({
            titulo: "Artículo " + i,
            autor: "Autor " + i,
            tema: "Tema " + i,
            estatus: "Pendiente"
        });
    }

    function cargarArticulos() {
        const inicio = paginaActual * porPagina;
        const fin = inicio + porPagina;
        const lista = document.getElementById("listaArticulos");
        lista.innerHTML = "";

        articulos.slice(inicio, fin).forEach(art => {
            lista.innerHTML += `
                <div class="card mb-2 articulo-card p-2"
                     onclick="seleccionarArticulo('${art.titulo}')">
                    <strong>${art.titulo}</strong><br>
                    Autor: ${art.autor}<br>
                    Tema: ${art.tema}<br>
                    Estatus: ${art.estatus}
                </div>
            `;
        });
    }

    function paginaSiguiente() {
        if ((paginaActual + 1) * porPagina < articulos.length) {
            paginaActual++;
            cargarArticulos();
        }
    }

    function paginaAnterior() {
        if (paginaActual > 0) {
            paginaActual--;
            cargarArticulos();
        }
    }

    function seleccionarArticulo(titulo) {
        document.getElementById("tituloSeleccionado").value = titulo;
    }

    function asignarRevision() {
        const titulo = document.getElementById("tituloSeleccionado").value;
        const tipo = document.getElementById("tipoRevision").value;
        const revisor = document.getElementById("revisor").value;

        if (!titulo || !tipo) {
            alert("Seleccione artículo y tipo de revisión");
            return;
        }

        const fecha = new Date().toLocaleDateString();

        const contenido = `
            <div class="border rounded p-2 mb-2 bg-white text-dark">
                <strong>${titulo}</strong><br>
                Revisor: ${revisor}<br>
                Fecha: ${fecha}
            </div>
        `;

        if (tipo === "Revisión Editorial")
            document.getElementById("editorialBox").innerHTML += contenido;
        else if (tipo === "Revisión Técnica")
            document.getElementById("tecnicaBox").innerHTML += contenido;
        else if (tipo === "Corrección de Estilo")
            document.getElementById("estiloBox").innerHTML += contenido;

        alert("Revisión asignada correctamente");
    }

    function buscarArticulo() {
        const texto = document.getElementById("buscarTitulo").value.toLowerCase();
        const lista = document.getElementById("listaArticulos");
        lista.innerHTML = "";

        articulos.filter(a => a.titulo.toLowerCase().includes(texto))
                 .slice(0, 10)
                 .forEach(art => {
            lista.innerHTML += `
                <div class="card mb-2 articulo-card p-2"
                     onclick="seleccionarArticulo('${art.titulo}')">
                    <strong>${art.titulo}</strong><br>
                    Autor: ${art.autor}<br>
                    Tema: ${art.tema}<br>
                    Estatus: ${art.estatus}
                </div>
            `;
        });
    }

    cargarArticulos();
</script>

</body>
</html>
