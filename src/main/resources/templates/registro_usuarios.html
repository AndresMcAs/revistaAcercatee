<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	>

<head>
<meta charset="UTF-8">
<title>Registro de Usuarios</title>

<!-- BOOTSTRAP CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: linear-gradient(135deg, #eaf1f1);
	min-height: 100vh;
}

.form-container {
	background: #fff;
	max-width: 900px;
	margin: 40px auto;
	padding: 30px;
	border-radius: 10px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}
</style>
</head>

<body>

	<!-- ===== NAVBAR DESDE HEADER ===== -->
	<div th:insert="~{header :: navbar}"></div>

	<!-- ===== FORMULARIO ===== -->
	<div class="form-container">
		<h2 class="text-center mb-4">Registro de Usuarios</h2>

		<form id="forma-registro" th:action="@{/usuario/registro}"
			method="post">

			<div class="row g-3">

				<div class="col-md-6">
					<label class="form-label">Nombre</label> <input type="text"
						class="form-control" id="nombre" name="nombre"
						placeholder="Ingrese su nombre" required>
				</div>

				<div class="col-md-6">
					<label class="form-label">Apellido Paterno</label> <input
						type="text" class="form-control" id="apellidopat"
						name="apellidoPaterno" placeholder="Ingrese su apellido paterno"
						required>
				</div>

				<div class="col-md-6">
					<label class="form-label">Apellido Materno</label> <input
						type="text" class="form-control" id="apellidomat"
						name="apellidoMaterno" placeholder="Ingrese su apellido materno">
				</div>

				<div class="col-md-6">
					<label class="form-label">Correo</label> <input type="email"
						class="form-control" id="correo" name="correo"
						placeholder="ejemplo@correo.com" required>
				</div>

				<div class="col-md-6">
					<label class="form-label">Especialidad</label> <input type="text"
						class="form-control" id="especialidad" name="especialidad"
						placeholder="Ej. Ingeniería" required>
				</div>

				<div class="col-md-6">
					<label class="form-label">Grado Académico</label> <select
						id="grado" name="gradoAcademico" class="form-select" required>

						<option value="">Seleccione grado</option>
						<option>Licenciatura</option>
						<option>Maestría</option>
						<option>Doctorado</option>
						<option>Posdoctorado</option>

					</select>
				</div>

				<div class="col-md-6">
					<label class="form-label">Institución</label> <select
						id="institucion" name="institucion" class="form-select" required>

						<option value="">Seleccione institución</option>
						<option>UNAM</option>
						<option>IPN</option>
						<option>UAM</option>
						<option>Tecnológico de Monterrey</option>
						<option>Otra</option>

					</select>
				</div>

				<div class="col-md-6">
					<label class="form-label">Teléfono</label> <input type="tel"
						id="telefono" name="telefono" class="form-control"
						placeholder="5512345678" required>
				</div>

				<div class="col-md-6">
					<label class="form-label">Género</label> <select id="genero"
						name="genero" class="form-select" required>

						<option value="">Seleccione género</option>
						<option>Masculino</option>
						<option>Femenino</option>
						<option>Otro</option>
						<option>Prefiero no decir</option>

					</select>
				</div>

				<div class="col-md-6">
					<label class="form-label">Rol</label> <select id="rol" name="rol"
						class="form-select" required>

						<option value="">Seleccione rol</option>
						<option>Revisor</option>
						<option>Editor</option>
						<option>Corrector de estilo</option>
						<option>Revisor Técnico</option>

					</select>
				</div>

			</div>

			<div class="d-flex gap-3 mt-4">

				<button type="submit" class="btn btn-success w-50">
					Registrar</button>

				<button type="button" class="btn btn-danger w-50"
					onclick="history.back()">Cancelar</button>

			</div>

		</form>
	</div>
	
	<!-- ===== MODAL MENSAJE ===== -->
<div class="modal fade" id="modalExitosoError" tabindex="-1"
     aria-labelledby="exampleModalLabel" aria-hidden="true">

    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title" id="exampleModalLabel">
                    Mensaje
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div id="modalMensaje">

                    <th:block th:if="${mensajeExitoso != null}">
                        <p th:text="${mensajeExitoso}"></p>
                    </th:block>

                    <th:block th:if="${mensajeError != null}">
                        <p th:text="${mensajeError}"></p>
                    </th:block>

                </div>

            </div>

            <div class="modal-footer">

                <button type="button"
                        class="btn btn-success"
                        data-bs-dismiss="modal">
                    Aceptar
                </button>

            </div>

        </div>
    </div>
</div>

	<!-- ===== BOOTSTRAP JS ===== -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/Revista.js}"></script>
</body>
</html>
